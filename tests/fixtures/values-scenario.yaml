image:
  repository: viloforge/vfobs
  tag: scenario
  pullPolicy: IfNotPresent

replicaCount: 1

env:
  - name: VFOBS_LOG_LEVEL
    value: INFO
  # WG2-T5: point the deployed VtfClient at the in-cluster vtfstub
  # (tests/fixtures/scenario-vtfstub.yaml). Same namespace -> short
  # service name resolves. With this set, the lifespan resolves the
  # production VtfClient + VtfTokenAuth so the read API is wired.
  - name: VFOBS_VTASKFORGE_URL
    value: "http://vtfstub:8080"

database:
  dsnSecret:
    name: vfobs-scenario-secrets
    key: database-url

ingestToken:
  secret:
    name: vfobs-scenario-secrets
    key: ingest-token

eso:
  enabled: false           # scenario uses a literal Secret (see scenario-secrets.yaml)
  secretStore:
    name: noop
  refreshInterval: 1h

monitoring:
  enabled: false

# Scenario script runs alembic out-of-band in prepare.sh (so the schema
# bootstrap can target a port-forwarded local Postgres without needing
# privileged in-cluster creds). Disable the chart's migrate Job to avoid
# a double-run + the bootstrap-secret dependency.
migrate:
  enabled: false
