apiVersion: apps/v1
kind: Deployment
metadata:
  name: vtfstub
  labels:
    app.kubernetes.io/name: vtfstub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vtfstub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vtfstub
    spec:
      containers:
        - name: vtfstub
          image: viloforge/vtfstub:scenario
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vtfstub
  labels:
    app.kubernetes.io/name: vtfstub
spec:
  selector:
    app.kubernetes.io/name: vtfstub
  ports:
    - port: 8080
      targetPort: 8080
