image:
  repository: viloforge/vfobs
  tag: ""            # falls back to .Chart.AppVersion if empty
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: []              # free-form non-secret env

# Runtime DB connection — the vfobs_app role. Secret key is read at
# Deployment time; production uses ExternalSecret managed elsewhere
# (argo/products/vfobs-dev/secrets/vfobs-secrets.yaml in viloforge-platform).
database:
  dsnSecret:
    name: vfobs-secrets
    key: DATABASE_URL

# Write-API auth — Bearer token.
ingestToken:
  secret:
    name: vfobs-secrets
    key: INGEST_TOKEN

imagePullSecrets: []

# Chart-managed ExternalSecret OFF in production deploys (those wire
# the ExternalSecret in the platform repo). Default-on remains for any
# standalone helm-install path.
eso:
  enabled: true
  secretStore:
    name: aws-sm
  refreshInterval: 1h

monitoring:
  enabled: false       # ServiceMonitor only if prometheus-operator is present

service:
  port: 8080
  type: ClusterIP

serviceAccount:
  create: true

# Schema migration via Helm pre-install/pre-upgrade hook Job. Also runs
# as ArgoCD PreSync so the migration completes before the new Deployment
# rolls out. Uses privileged DB creds from a separate Secret
# (bootstrapSecretName) — the existing vtf user, which is the superuser
# of the shared vtf-db Postgres (per OIQ2). The vfobs_app role's password
# comes from the runtime vfobs-secrets so migration sets the SAME value
# the Deployment uses.
migrate:
  enabled: true
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  # Secret containing the privileged DATABASE_URL (vtf user). Defaults to
  # vfobs-bootstrap-creds (the production ExternalSecret). Override to a
  # local Secret in test scenarios.
  bootstrapSecretName: vfobs-bootstrap-creds
  bootstrapSecretKey: DATABASE_URL
