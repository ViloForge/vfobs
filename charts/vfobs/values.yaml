image:
  repository: viloforge/vfobs
  tag: ""            # falls back to .Chart.AppVersion if empty
  pullPolicy: IfNotPresent

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env: []              # free-form non-secret env

database:
  dsnSecret:
    name: vfobs-secrets
    key: database-url   # ESO writes this key

ingestToken:
  secret:
    name: vfobs-secrets
    key: ingest-token   # ESO writes this key

eso:
  enabled: true
  secretStore:
    name: vault-backend
  refreshInterval: 1h

monitoring:
  enabled: false       # ServiceMonitor only if prometheus-operator is present

service:
  port: 8080
  type: ClusterIP

serviceAccount:
  create: true
